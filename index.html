<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>{{PLAYER_NAME}}'s Adventure 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: #1a0a2e;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:'Press Start 2P', monospace;
}

canvas {
  border:3px solid #ff69b4;
  max-width:95vw;
  image-rendering:pixelated;
}

#overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#1a0a2eee;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

#overlay h1 {
  color:#ff69b4;
  font-size:16px;
  text-align:center;
}

#overlay p {
  color:#ffb3d9;
  font-size:10px;
  text-align:center;
  white-space:pre-line;
}
</style>
</head>

<body>

<canvas id="game" width="480" height="320"></canvas>

<div id="overlay">
  <h1 id="title"></h1>
  <p id="desc"></p>
  <button id="start-btn">START ADVENTURE ♥</button>
</div>

<script>

// ===== TEMPLATE =====
const PLAYER_NAME = "{{PLAYER_NAME}}"
const PARTNER_NAME = "{{PARTNER_NAME}}"

// ===== UI =====
document.getElementById('title').textContent =
  `${PLAYER_NAME}'s Adventure 💕`

document.getElementById('desc').textContent =
`Help ${PLAYER_NAME} collect all the hearts ♥

Avoid ghosts and reach ${PARTNER_NAME}!`

// ===== GAME =====
const canvas = document.getElementById('game')
const ctx = canvas.getContext('2d')

const GRAVITY = 0.6
const JUMP_FORCE = -12
const SPEED = 3.5

let keys = { left:false, right:false, jump:false }

let player, platforms, hearts, ghosts
let running = false

function init(){
  player = { x:40, y:220, vx:0, vy:0, onGround:false, facing:1, jumpPressed:false }

  platforms = [
    {x:0,y:288,w:480,h:32},
    {x:80,y:224,w:96,h:16},
    {x:240,y:192,w:96,h:16}
  ]

  hearts = [
    {x:100,y:200,collected:false},
    {x:260,y:168,collected:false},
    {x:375,y:216,collected:false}
  ]

  ghosts = [
    {x:200,y:256,dir:1},
    {x:360,y:208,dir:-1}
  ]
}

// ===== UPDATE =====
function update(){
  if(!running) return

  let dx = 0
  if(keys.left) dx = -SPEED
  if(keys.right) dx = SPEED

  player.vx = dx

  if(keys.jump && player.onGround && !player.jumpPressed){
    player.vy = JUMP_FORCE
    player.jumpPressed = true
    player.onGround = false
  }
  if(!keys.jump) player.jumpPressed = false

  player.vy += GRAVITY
  player.x += player.vx
  player.y += player.vy
  player.onGround = false

  platforms.forEach(p=>{
    if(player.x < p.x+p.w &&
       player.x+20 > p.x &&
       player.y < p.y+p.h &&
       player.y+28 > p.y){

      if(player.vy >= 0){
        player.y = p.y - 28
        player.vy = 0
        player.onGround = true
      }
    }
  })

  hearts.forEach(h=>{
    if(!h.collected &&
       Math.abs(player.x-h.x)<20 &&
       Math.abs(player.y-h.y)<20){
      h.collected = true
    }
  })

  ghosts.forEach(g=>{
    g.x += g.dir * 1.5
    if(g.x > 320 || g.x < 120) g.dir *= -1

    if(Math.abs(player.x-g.x)<20 && Math.abs(player.y-g.y)<20){
      showOverlay("💀 Game Over","Try again!","RETRY",()=>{
        init(); running=true
      })
    }
  })

  if(hearts.every(h=>h.collected)){
    showOverlay(
      `🎉 ${PLAYER_NAME} WINS!`,
      `${PLAYER_NAME} reached ${PARTNER_NAME}! 💕`,
      "PLAY AGAIN",
      ()=>{
        init(); running=true
      }
    )
  }
}

// ===== DRAW =====
function draw(){
  ctx.fillStyle="#1a0a2e"
  ctx.fillRect(0,0,480,320)

  // platforms
  ctx.fillStyle="#5c2d8a"
  platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h))

  // hearts
  ctx.fillStyle="#ff4d8d"
  hearts.forEach(h=>{
    if(!h.collected) ctx.fillRect(h.x,h.y,10,10)
  })

  // ghosts
  ctx.fillStyle="#b0c4ff"
  ghosts.forEach(g=>ctx.fillRect(g.x,g.y,20,20))

  // player (RESTORED SIZE)
  ctx.fillStyle="#ff9de2"
  ctx.fillRect(player.x,player.y,20,28)

  // partner goal
  ctx.fillStyle="#ffe066"
  ctx.fillRect(440,240,20,40)
}

// ===== LOOP =====
function loop(){
  update()
  draw()
  requestAnimationFrame(loop)
}

// ===== OVERLAY =====
function showOverlay(t,m,b,cb){
  const ov = document.getElementById('overlay')
  ov.style.display='flex'
  ov.querySelector('h1').textContent = t
  ov.querySelector('p').textContent = m
  ov.querySelector('button').textContent = b
  ov.querySelector('button').onclick = ()=>{
    ov.style.display='none'
    cb()
  }
}

// ===== CONTROLS =====
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft'||e.key==='a') keys.left=true
  if(e.key==='ArrowRight'||e.key==='d') keys.right=true
  if(e.key==='ArrowUp'||e.key===' '||e.key==='w') keys.jump=true
})

document.addEventListener('keyup', e=>{
  if(e.key==='ArrowLeft'||e.key==='a') keys.left=false
  if(e.key==='ArrowRight'||e.key==='d') keys.right=false
  if(e.key==='ArrowUp'||e.key===' '||e.key==='w') keys.jump=false
})

// ===== START =====
document.getElementById('start-btn').onclick = ()=>{
  document.getElementById('overlay').style.display='none'
  init()
  running = true
}

loop()
</script>
</body>
</html>
