<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>{{PLAYER_NAME}}'s Adventure 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: #1a0a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Press Start 2P', monospace;
  overflow: hidden;
}

#ui {
  display:flex;
  justify-content:space-between;
  width:480px;
  max-width:95vw;
  padding:8px;
}

#ui span {
  color:#ffb3d9;
  font-size:7px;
}

canvas {
  border:3px solid #ff69b4;
  max-width:95vw;
  image-rendering:pixelated;
}

#controls {
  display:flex;
  gap:12px;
  margin-top:12px;
}

.btn {
  background:#3d1a5e;
  border:2px solid #ff69b4;
  color:#fff;
  font-size:20px;
  padding:18px 24px;
  border-radius:8px;
}

.btn:active {
  transform:scale(0.9);
  box-shadow:0 0 20px #ff69b4;
}

#overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#1a0a2eee;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

#overlay h1 {
  color:#ff69b4;
  font-size:16px;
  text-align:center;
}

#overlay p {
  color:#ffb3d9;
  font-size:10px;
  text-align:center;
  max-width:300px;
  white-space:pre-line;
}

#overlay button {
  background:#ff69b4;
  color:#fff;
  padding:12px 20px;
  border:none;
}
</style>
</head>

<body>

<div id="ui">
  <span id="level-ui">LEVEL 1</span>
  <span id="hearts-ui">♥ 0/5</span>
  <span id="lives-ui">LIVES: 3</span>
</div>

<canvas id="game" width="480" height="320"></canvas>

<div id="controls">
  <button class="btn" id="left">◀</button>
  <button class="btn" id="jump">▲</button>
  <button class="btn" id="right">▶</button>
</div>

<div id="overlay">
  <h1 id="title"></h1>
  <p id="desc"></p>
  <button id="start">START</button>
</div>

<script>
const PLAYER_NAME = "{{PLAYER_NAME}}"
const PARTNER_NAME = "{{PARTNER_NAME}}"

const GAME_TITLE = `${PLAYER_NAME}'s Adventure 💕`
const WIN_MESSAGE = `${PLAYER_NAME} saved ${PARTNER_NAME}! 💕`

document.getElementById('title').textContent = GAME_TITLE
document.getElementById('desc').textContent =
`Help ${PLAYER_NAME} collect all the hearts ♥

Avoid ghosts and reach ${PARTNER_NAME}!`

const canvas = document.getElementById('game')
const ctx = canvas.getContext('2d')

let player = {x:40,y:200,vx:0,vy:0,onGround:false}
let gravity = 0.6
let level = 0
let hearts = []
let ghosts = []
let collected = 0
let running = false

function init(){
  collected = 0
  player = {x:40,y:200,vx:0,vy:0,onGround:false}

  hearts = [
    {x:150,y:200},
    {x:300,y:160},
    {x:420,y:200}
  ]

  ghosts = [
    {x:200,y:260,dir:1},
    {x:350,y:260,dir:-1}
  ]
}

function update(){
  if(!running) return

  player.vy += gravity
  player.y += player.vy

  if(player.y > 260){
    player.y = 260
    player.vy = 0
    player.onGround = true
  }

  ghosts.forEach(g=>{
    g.x += g.dir * (1 + level*0.2)
    if(g.x < 100 || g.x > 380) g.dir *= -1

    if(Math.abs(player.x - g.x) < 20 && Math.abs(player.y - g.y) < 20){
      showOverlay("💀 Game Over", "Try again!", "RETRY", ()=>{
        init()
        running = true
      })
    }
  })

  hearts.forEach(h=>{
    if(!h.collected && Math.abs(player.x-h.x)<20 && Math.abs(player.y-h.y)<20){
      h.collected = true
      collected++
      spawnParticles(h.x,h.y)

      if(collected === hearts.length){
        showOverlay(`🎉 ${PLAYER_NAME} WINS!`, WIN_MESSAGE, "PLAY AGAIN", ()=>{
          level=0
          init()
          running=true
        })
      }
    }
  })
}

function spawnParticles(x,y){
  for(let i=0;i<12;i++){
    ctx.fillStyle="#ff69b4"
    ctx.fillRect(x+Math.random()*10,y+Math.random()*10,3,3)
  }
}

function draw(){
  ctx.fillStyle="#1a0a2e"
  ctx.fillRect(0,0,480,320)

  ctx.fillStyle="#ff4d8d"
  hearts.forEach(h=>{
    if(!h.collected) ctx.fillRect(h.x,h.y,10,10)
  })

  ctx.fillStyle="#b0c4ff"
  ghosts.forEach(g=>{
    ctx.fillRect(g.x,g.y,20,20)
  })

  ctx.fillStyle="#ff9de2"
  ctx.fillRect(player.x,player.y,20,20)
}

function loop(){
  update()
  draw()
  requestAnimationFrame(loop)
}

function showOverlay(t,m,b,cb){
  const ov = document.getElementById('overlay')
  ov.style.display='flex'
  ov.querySelector('h1').textContent = t
  ov.querySelector('p').textContent = m
  ov.querySelector('button').textContent = b
  ov.querySelector('button').onclick = ()=>{
    ov.style.display='none'
    cb()
  }
}

document.getElementById('start').onclick = ()=>{
  document.getElementById('overlay').style.display='none'
  init()
  running = true
}

document.addEventListener('keydown',e=>{
  if(e.key==="ArrowLeft") player.x-=5
  if(e.key==="ArrowRight") player.x+=5
  if(e.key===" " && player.onGround){
    player.vy = -12
    player.onGround = false
  }
})

loop()
</script>
</body>
</html>
