<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>{{PLAYER_NAME}}'s Adventure 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  background:#1a0a2e;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:'Press Start 2P', monospace;
}

canvas {
  border:3px solid #ff69b4;
  max-width:95vw;
  image-rendering:pixelated;
}

#overlay {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#1a0a2eee;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

#overlay h1 {
  color:#ff69b4;
  font-size:16px;
  text-align:center;
}

#overlay p {
  color:#ffb3d9;
  font-size:10px;
  text-align:center;
  white-space:pre-line;
}
</style>
</head>

<body>

<canvas id="game" width="480" height="320"></canvas>

<div id="overlay">
  <h1 id="title"></h1>
  <p id="desc"></p>
  <button id="start">START</button>
</div>

<script>
const PLAYER_NAME = "{{PLAYER_NAME}}"
const PARTNER_NAME = "{{PARTNER_NAME}}"

document.getElementById('title').textContent =
  `${PLAYER_NAME}'s Adventure 💕`

document.getElementById('desc').textContent =
`Help ${PLAYER_NAME} collect all the hearts ♥

Avoid ghosts and reach ${PARTNER_NAME}!`

const canvas = document.getElementById('game')
const ctx = canvas.getContext('2d')

let player = {x:40,y:260,vx:0,vy:0,onGround:true}
let gravity = 0.6

let hearts = [
  {x:150,y:200,collected:false},
  {x:300,y:180,collected:false},
  {x:420,y:200,collected:false}
]

let ghosts = [
  {x:200,y:240,dir:1},
  {x:350,y:240,dir:-1}
]

let running = false

function update(){
  if(!running) return

  player.vy += gravity
  player.y += player.vy

  if(player.y > 260){
    player.y = 260
    player.vy = 0
    player.onGround = true
  }

  ghosts.forEach(g=>{
    g.x += g.dir * 1.5
    if(g.x < 100 || g.x > 380) g.dir *= -1

    if(Math.abs(player.x-g.x)<20 && Math.abs(player.y-g.y)<20){
      showOverlay("💀 Game Over","Try again!","RETRY",()=>{
        reset()
        running=true
      })
    }
  })

  let collectedCount = 0

  hearts.forEach(h=>{
    if(!h.collected &&
       Math.abs(player.x-h.x)<20 &&
       Math.abs(player.y-h.y)<20){
      h.collected = true
    }
    if(h.collected) collectedCount++
  })

  if(collectedCount === hearts.length){
    showOverlay(
      `🎉 ${PLAYER_NAME} WINS!`,
      `${PLAYER_NAME} saved ${PARTNER_NAME}! 💕`,
      "PLAY AGAIN",
      ()=>{
        reset()
        running=true
      }
    )
  }
}

function draw(){
  ctx.fillStyle="#1a0a2e"
  ctx.fillRect(0,0,480,320)

  // hearts
  ctx.fillStyle="#ff4d8d"
  hearts.forEach(h=>{
    if(!h.collected) ctx.fillRect(h.x,h.y,10,10)
  })

  // ghosts
  ctx.fillStyle="#b0c4ff"
  ghosts.forEach(g=>{
    ctx.fillRect(g.x,g.y,20,20)
  })

  // player
  ctx.fillStyle="#ff9de2"
  ctx.fillRect(player.x,player.y,20,20)
}

function loop(){
  update()
  draw()
  requestAnimationFrame(loop)
}

function reset(){
  player.x = 40
  player.y = 260
  player.vy = 0
  hearts.forEach(h=>h.collected=false)
}

function showOverlay(t,m,b,cb){
  const ov = document.getElementById('overlay')
  ov.style.display='flex'
  ov.querySelector('h1').textContent = t
  ov.querySelector('p').textContent = m
  ov.querySelector('button').textContent = b
  ov.querySelector('button').onclick = ()=>{
    ov.style.display='none'
    cb()
  }
}

document.getElementById('start').onclick = ()=>{
  document.getElementById('overlay').style.display='none'
  reset()
  running = true
}

document.addEventListener('keydown',e=>{
  if(e.key==="ArrowLeft") player.x-=5
  if(e.key==="ArrowRight") player.x+=5
  if(e.key===" " && player.onGround){
    player.vy = -12
    player.onGround=false
  }
})

loop()
</script>
</body>
</html>
