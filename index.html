<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>{{PLAYER_NAME}}'s Adventure 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#1a0a2e;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:'Press Start 2P', monospace;
}

canvas {
  border:3px solid #ff69b4;
  max-width:95vw;
  image-rendering:pixelated;
}

#overlay {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#1a0a2eee;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

#overlay h1 {
  color:#ff69b4;
  font-size:16px;
  text-align:center;
}

#overlay p {
  color:#ffb3d9;
  font-size:10px;
  text-align:center;
  white-space:pre-line;
}
</style>
</head>

<body>

<canvas id="game" width="480" height="320"></canvas>

<div id="overlay">
  <h1 id="title"></h1>
  <p id="desc"></p>
  <button id="start">START</button>
</div>

<script>
// TEMPLATE VARIABLES
const PLAYER_NAME = "{{PLAYER_NAME}}"
const PARTNER_NAME = "{{PARTNER_NAME}}"

// UI TEXT
document.getElementById('title').textContent =
  `${PLAYER_NAME}'s Adventure 💕`

document.getElementById('desc').textContent =
`Help ${PLAYER_NAME} collect all the hearts ♥

Avoid obstacles and reach ${PARTNER_NAME}!`

// CANVAS
const canvas = document.getElementById('game')
const ctx = canvas.getContext('2d')

// GAME STATE
let player, hearts, enemies, platforms
let running = false
let gravity = 0.6

function init(){
  player = {x:40,y:200,vx:0,vy:0,onGround:false}

  platforms = [
    {x:0,y:280,w:480,h:40},
    {x:120,y:220,w:100,h:10},
    {x:280,y:180,w:100,h:10}
  ]

  hearts = [
    {x:140,y:190,collected:false},
    {x:300,y:150,collected:false},
    {x:420,y:240,collected:false}
  ]

  enemies = [
    {x:200,y:260,dir:1},
    {x:350,y:260,dir:-1}
  ]
}

// UPDATE
function update(){
  if(!running) return

  player.vy += gravity
  player.y += player.vy
  player.onGround = false

  platforms.forEach(p=>{
    if(player.x < p.x+p.w &&
       player.x+20 > p.x &&
       player.y < p.y+p.h &&
       player.y+20 > p.y){

      if(player.vy > 0){
        player.y = p.y - 20
        player.vy = 0
        player.onGround = true
      }
    }
  })

  enemies.forEach(e=>{
    e.x += e.dir * 1.5
    if(e.x < 100 || e.x > 380) e.dir *= -1

    if(Math.abs(player.x-e.x)<20 && Math.abs(player.y-e.y)<20){
      showOverlay("💀 Game Over","Try again!","RETRY",()=>{
        init(); running=true
      })
    }
  })

  let count = 0

  hearts.forEach(h=>{
    if(!h.collected &&
       Math.abs(player.x-h.x)<20 &&
       Math.abs(player.y-h.y)<20){
      h.collected = true
    }
    if(h.collected) count++
  })

  if(count === hearts.length){
    showOverlay(
      `🎉 ${PLAYER_NAME} WINS!`,
      `${PLAYER_NAME} reached ${PARTNER_NAME}! 💕`,
      "PLAY AGAIN",
      ()=>{
        init(); running=true
      }
    )
  }
}

// DRAW
function draw(){
  ctx.fillStyle="#1a0a2e"
  ctx.fillRect(0,0,480,320)

  // platforms
  ctx.fillStyle="#5c2d8a"
  platforms.forEach(p=>{
    ctx.fillRect(p.x,p.y,p.w,p.h)
  })

  // hearts
  ctx.fillStyle="#ff4d8d"
  hearts.forEach(h=>{
    if(!h.collected) ctx.fillRect(h.x,h.y,10,10)
  })

  // enemies
  ctx.fillStyle="#b0c4ff"
  enemies.forEach(e=>{
    ctx.fillRect(e.x,e.y,20,20)
  })

  // player
  ctx.fillStyle="#ff9de2"
  ctx.fillRect(player.x,player.y,20,20)

  // partner goal
  ctx.fillStyle="#ffe066"
  ctx.fillRect(440,240,20,40)
}

// LOOP
function loop(){
  update()
  draw()
  requestAnimationFrame(loop)
}

// OVERLAY
function showOverlay(t,m,b,cb){
  const ov = document.getElementById('overlay')
  ov.style.display='flex'
  ov.querySelector('h1').textContent = t
  ov.querySelector('p').textContent = m
  ov.querySelector('button').textContent = b
  ov.querySelector('button').onclick = ()=>{
    ov.style.display='none'
    cb()
  }
}

// START
document.getElementById('start').onclick = ()=>{
  document.getElementById('overlay').style.display='none'
  init()
  running = true
}

// CONTROLS
document.addEventListener('keydown',e=>{
  if(e.key==="ArrowLeft") player.x-=5
  if(e.key==="ArrowRight") player.x+=5
  if(e.key===" " && player.onGround){
    player.vy = -12
  }
})

loop()
</script>
</body>
</html>
